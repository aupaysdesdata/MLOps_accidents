version: '3.8'
services:
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.11.3
    ports:
      - "5000:5000"
    command: mlflow server --backend-store-uri sqlite:///mlflow.db --artifacts-destination /app/mlruns --serve-artifacts --host 0.0.0.0 --port 5000
    volumes:
      - ./mlruns:/app/mlruns

  train:
    build:
      context: .
      dockerfile: src/train/Dockerfile
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    volumes:
      - ./mlruns:/app/mlruns

  ml-api:
    build:
      context: .
      dockerfile: src/bentoml/Dockerfile.local
    container_name: accident-prediction-api
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    expose:
      - "3000"
    restart: unless-stopped
    depends_on:
      mlflow:
        condition: service_started
      train:
        condition: service_completed_successfully

  streamlit:
    build:
      context: .
      dockerfile: src/streamlit/Dockerfile
    environment:
      - MODEL_API_URL=http://ml-api:3000
    ports:
      - "8501:8501"
    depends_on:
      - ml-api

  nginx:
    build:
      context: src/nginx
      dockerfile: Dockerfile
    ports:
      - "443:443"
      - "80:80"
    depends_on:
      - streamlit
      - ml-api
    restart: unless-stopped

  postgres-airflow:
    image: postgres:15
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres-airflow-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  airflow:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres-airflow/airflow
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
      AIRFLOW__WEBSERVER__SECRET_KEY: 'accidents_mlops_secret'
      PYTHONPATH: /opt/airflow/src:/opt/airflow/src/data:/opt/airflow/src/models
      MLFLOW_TRACKING_URI: http://mlflow:5000
      AIRFLOW__WEBSERVER__WORKERS: '1'

    volumes:
      - ./dags:/opt/airflow/dags
      - ./src:/opt/airflow/src
      - ./data:/opt/airflow/data
      - airflow-logs:/opt/airflow/logs
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "8080:8080"
    user: root
    command: >
      bash -c "
        chmod 666 /var/run/docker.sock || true &&
        rm -f /opt/airflow/airflow-webserver.pid &&
        su -s /bin/bash airflow -c '
          airflow db migrate &&
          airflow users create --username admin --password admin --firstname Admin --lastname Admin --role Admin --email admin@example.com || true &&
          airflow scheduler &
          airflow webserver
        '
      "
    depends_on:
      postgres-airflow:
        condition: service_healthy
      mlflow:
        condition: service_started
    restart: on-failure

volumes:
  postgres-airflow-data:
  airflow-logs:
