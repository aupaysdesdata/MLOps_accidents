version: '3.8'

services:
  predict:
    build:
      context: .
      dockerfile: src/models/Dockerfile.predict
    container_name: predict
    ports:
      - "8000:8000"

  streamlit:
    build:
      context: .
      dockerfile: src/streamlit/Dockerfile
    environment:
      - MODEL_API_URL=http://predict:8000
    ports:
      - "8501:8501"

  postgres-airflow:
    image: postgres:15
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres-airflow-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  mlflow:
    image: ghcr.io/mlflow/mlflow:latest
    ports:
      - "5000:5000"
    command: mlflow server --host 0.0.0.0 --port 5000 --backend-store-uri sqlite:////mlflow/mlflow.db --default-artifact-root /mlruns
    volumes:
      - mlflow-db:/mlflow
      - mlruns:/mlruns
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  airflow:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres-airflow/airflow
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
      AIRFLOW__WEBSERVER__SECRET_KEY: 'accidents_mlops_secret'
      PYTHONPATH: /opt/airflow/src:/opt/airflow/src/data:/opt/airflow/src/models
      MLFLOW_TRACKING_URI: http://mlflow:5000
    volumes:
      - ./dags:/opt/airflow/dags
      - ./src:/opt/airflow/src
      - ./data:/opt/airflow/data
      - airflow-logs:/opt/airflow/logs
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "8080:8080"
    command: >
      bash -c "
        airflow db migrate &&
        airflow users create --username admin --password admin --firstname Admin --lastname Admin --role Admin --email admin@example.com || true &&
        airflow scheduler &
        airflow webserver
      "
    depends_on:
      postgres-airflow:
        condition: service_healthy
      mlflow:
        condition: service_started
    restart: on-failure

volumes:
  postgres-airflow-data:
  airflow-logs:
  mlflow-db:
  mlruns:
