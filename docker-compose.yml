services:
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.11.3
    ports:
      - "5000:5000"
    command: mlflow server --backend-store-uri sqlite:///mlflow.db --default-artifact-root /app/mlruns --host 0.0.0.0 --port 5000
    volumes:
      - ./mlruns:/app/mlruns
  train:
    build:
      context: .
      dockerfile: src/models/Dockerfile.train
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    volumes:
      - ./mlruns:/app/mlruns
  predict:
    build:
      context: .
      dockerfile: src/models/Dockerfile.predict
    container_name: predict
    ports:
      - "8000:8000"
  streamlit:
    build:
      context: .
      dockerfile: src/streamlit/Dockerfile
    environment:
      - MODEL_API_URL=http://predict:8000
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    ports:
      - "8501:8501"