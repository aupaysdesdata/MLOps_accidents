service: "src.bentoml.service:PredictService" # anciennement "src.bentoml.service:RFClassifierService" mais pas bon
description: "Service for predicting accidents"
labels:
  owner: "DataScientest"
  project: "accident_prediction"

# On inclut le dossier src à la racine du Bento
include:
  - src/

models:
  - model_rf:latest # en prod mettre --> accidents_rf:latest (pour les tests cela ne peut pas marcher)

python:
  packages:
    - numpy==1.26.4
    - pandas==2.3.3
    - scikit-learn==1.3.2
    - bentoml==1.4.39
    - pydantic==2.11.0
    - requests==2.32.5
    - pyjwt==2.10.1